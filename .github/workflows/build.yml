name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM (for bindgen / llama-cpp-2)
        run: choco install llvm -y --no-progress
        shell: pwsh

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Cache cargo + llama.cpp build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-embed-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (with embedding feature)
        run: cargo build --release

      - name: Package release zip
        shell: pwsh
        run: |
          $stage = "haku-windows-x64"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item target/release/haku.exe "$stage/"
          Copy-Item dist/install.bat "$stage/"
          Copy-Item dist/uninstall.bat "$stage/"
          Copy-Item dist/README.txt "$stage/"
          Copy-Item LICENSE "$stage/LICENSE.txt"
          Compress-Archive -Path "$stage/*" -DestinationPath "haku-windows-x64.zip" -Force
          Get-Item haku-windows-x64.zip | Select-Object Name, Length

      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: haku-windows-x64
          path: haku-windows-x64.zip

      - name: Upload artifact (bare exe)
        uses: actions/upload-artifact@v4
        with:
          name: haku-windows-exe
          path: target/release/haku.exe

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: haku-windows-x64.zip
          generate_release_notes: true

  macos-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install LLVM
        run: brew install llvm cmake
      - name: Check
        run: cargo check
        env:
          LIBCLANG_PATH: /opt/homebrew/opt/llvm/lib

  linux-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y libclang-dev cmake
      - name: Check
        run: cargo check
